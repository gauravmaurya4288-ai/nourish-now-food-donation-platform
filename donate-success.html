<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Donation Successful | Nourish Now</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/success.css">

</head>

<body>

<div id="navbar"></div>

<section class="success">

    <div class="success-card">

        <div class="checkmark">

            ✓

        </div>

        <h1>Donation Submitted Successfully!</h1>

        <p>

            Thank you for your generous contribution.

            Our volunteer will contact you shortly.

        </p>

        <div class="summary">

            <h3>Donation Summary</h3>

            <p><strong>Donor:</strong> <span id="donorName"></span></p>

            <p><strong>Food:</strong> <span id="foodName"></span></p>

            <p><strong>Category:</strong> <span id="category"></span></p>

            <p><strong>Meals:</strong> <span id="quantity"></span></p>

        </div>

        <div class="buttons">

            <a href="donate.html" class="btn-secondary">

                Donate Again

            </a>

            <a href="index.html" class="btn-primary">

                Back Home

            </a>

        </div>

    </div>

</section>

<div id="footer"></div>

<script src="js/components.js"></script>
<script src="js/success.js"></script>

</body>

</html>
