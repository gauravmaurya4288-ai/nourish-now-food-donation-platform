<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | Nourish Now</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/responsive.css">

</head>

<body>

<div id="navbar"></div>

<!-- ================= LOGIN ================= -->

<section class="login-page">

    <div class="login-container">

        <!-- Left Side -->

        <div class="login-image">

            <img src="https://cimages.milaap.org/milaap/image/upload/c_fill,g_faces,h_315,w_420/v1601462795/production/images/campaign/216196/IMG-20200918-WA0011_onjlmn_1601462799.jpg"
                 alt="Food Donation">

        </div>

        <!-- Right Side -->

        <div class="login-card">

            <h2>Welcome Back 👋</h2>

            <p>

                Login to continue helping people through food donation.

            </p>

            <form id="loginForm">

                <div class="input-box">

                    <label>Email Address</label>

                    <input
                        type="email"
                        id="loginEmail"
                        placeholder="Enter your email"
                        required>

                </div>

                <div class="input-box">

                    <label>Password</label>

                    <div class="password-box">

                        <input
                            type="password"
                            id="loginPassword"
                            placeholder="Enter your password"
                            required>

                        <i class="fas fa-eye" id="togglePassword"></i>

                    </div>

                </div>

                <div class="login-options">

                    <label>

                        <input type="checkbox">

                        Remember Me

                    </label>

                    <a href="#">Forgot Password?</a>

                </div>

                <button
                    type="submit"
                    class="login-btn">

                    Login

                </button>

            </form>

            <div class="divider">

                <span>OR</span>

            </div>

            <div class="social-login">

                <button class="google">

                    <i class="fab fa-google"></i>

                    Google

                </button>

                <button class="facebook">

                    <i class="fab fa-facebook-f"></i>

                    Facebook

                </button>

            </div>

            <div class="register-link">

                Don't have an account?

                <a href="register.html">

                    Register

                </a>

            </div>

        </div>

    </div>

</section>

<div id="footer"></div>

<script src="js/components.js"></script>
<script src="js/auth.js"></script>

</body>

</html>
